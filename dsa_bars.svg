<svg width="860" height="400" viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="860" height="400" fill="#06060a" rx="8"/>
  
  <!-- Title -->
  <text x="430" y="20" text-anchor="middle"
    style="font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.4em;fill:#4e4c48">DSA PROFICIENCY  ·  500+ PROBLEMS SOLVED</text>
  
  <!-- 500+ big number -->
  <text x="830" y="30" text-anchor="end"
    style="font-family:Impact,'Arial Black',sans-serif;font-size:28px;fill:#c9a84c;opacity:0.15">500+</text>
  <!-- Arrays & Hashing -->
  <g opacity="0" transform="translate(0,0)">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.20s" fill="freeze"/>
    
    <!-- Label -->
    <text x="170" y="54" text-anchor="end"
      style="font-family:'Courier New',monospace;font-size:10px;fill:#9a9490;letter-spacing:0.04em">Arrays & Hashing</text>
    
    <!-- Track -->
    <rect x="180" y="44" width="600" height="8" fill="#111118" rx="4"/>
    
    <!-- Bar -->
    <rect x="180" y="44" width="0" height="8" fill="#c9a84c" rx="4" opacity="0.85">
      <animate attributeName="width" from="0" to="552" dur="0.6s" begin="0.20s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    </rect>
    
    <!-- Pct label -->
    <text x="740" y="54"
      style="font-family:'Courier New',monospace;font-size:9px;fill:#c9a84c;letter-spacing:0.05em;opacity:0">
      92%
      <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="0.70s" fill="freeze"/>
    </text>
  </g>
  <!-- Two Pointers -->
  <g opacity="0" transform="translate(0,0)">
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.28s" fill="freeze"/>
    
